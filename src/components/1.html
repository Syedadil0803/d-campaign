    <style>
        body {
            background-color: #020617;
            /* Void navy background */
            position: relative;
        }

        /* Atmospheric orange spotlight */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(251, 146, 60, 0.15) 0%, rgba(2, 6, 23, 0) 60%);
            pointer-events: none;
            z-index: -1;
        }

        .gradient-card {
            background: linear-gradient(135deg, #1E293B 0%, #111827 100%);
            border: 1px solid #334155;
            border-radius: 8px;
            /* Assuming 8px matches lg or custom requirement from prompt */
        }
         .gradient-card-a {
            background: linear-gradient(135deg, #29344F 0%, #111827 100%);
            border: 1px solid #334155;
            border-radius: 8px;
            /* Assuming 8px matches lg or custom requirement from prompt */
        }

        .glow-button:hover {
            box-shadow: 0 0 12px rgba(251, 146, 60, 0.4);
        }
    </style>

<body class="text-on-background min-h-screen flex flex-col font-body-md text-body-md overflow-x-hidden antialiased">
    <!-- TopNavBar -->
    <nav
        class="bg-background dark:bg-background border-b border-outline-variant dark:border-outline-variant docked full-width top-0 z-50">
        <div class="flex justify-between items-center w-full px-margin py-base max-w-full">
            <!-- Brand -->
            <div class="flex items-center gap-sm">
                <span class="material-symbols-outlined text-primary dark:text-primary text-h3"
                    data-weight="fill">campaign</span>
                <span
                    class="text-h3 font-h3 font-bold text-primary dark:text-primary tracking-tight">CampaignFlow</span>
            </div>
            <!-- Navigation Links (Web) -->
            <div class="hidden md:flex items-center gap-margin">
                <a class="text-primary font-bold border-b-2 border-primary pb-2 font-label-caps text-label-caps uppercase transition-all duration-150"
                    href="#">Dashboard</a>
                <a class="text-on-surface-variant dark:text-on-surface-variant font-medium hover:text-primary transition-colors duration-200 font-label-caps text-label-caps uppercase pb-2"
                    href="#">Announcements</a>
                <a class="text-on-surface-variant dark:text-on-surface-variant font-medium hover:text-primary transition-colors duration-200 font-label-caps text-label-caps uppercase pb-2"
                    href="#">Promo Studio</a>
            </div>
            <!-- Trailing Actions -->
            <div class="flex items-center gap-md">
                <div class="hidden md:flex gap-sm">
                    <button aria-label="Settings"
                        class="text-on-surface-variant hover:text-primary transition-colors duration-200">
                        <span class="material-symbols-outlined">settings</span>
                    </button>
                    <button aria-label="Notifications"
                        class="text-on-surface-variant hover:text-primary transition-colors duration-200">
                        <span class="material-symbols-outlined">notifications</span>
                    </button>
                </div>
                <button
                    class="bg-primary-container text-[#000000] px-md py-sm rounded font-label-caps text-label-caps hover:bg-surface-tint transition-colors duration-200 glow-button font-bold flex items-center gap-xs">
                    <span class="material-symbols-outlined text-[16px]">add</span>
                    Create Campaign
                </button>
                <!-- Mobile Menu Toggle -->
                <button class="md:hidden text-on-background">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
    </nav>
    <!-- Main Content Canvas -->
    <main class="flex-grow flex flex-col container mx-auto px-margin py-xl max-w-[1200px]">
        <!-- Header Section -->
        <header class="mb-xl flex flex-col gap-sm">
            <h1 class="font-h1 text-h1 text-on-background">Campaign Hub</h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl">
                Command center for active marketing operations. Select a module below to configure global announcements
                or deploy targeted promotional cards across the platform ecosystem.
            </p>
        </header>
        <!-- Bento Grid / Cards Area -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
            <!-- Announcement Bar Card -->
            <article
                class="gradient-card-a p-[32px] flex flex-col h-full relative group overflow-hidden transition-colors duration-300 hover:border-outline">
                <!-- Decorative Icon Background Blur -->
              <div style="height: 250px;"></div>
            </article>
            <!-- Promo Card Studio Card -->
            <article
                class="gradient-card ">
                <!-- Decorative Icon Background Blur -->
              
               
               
            </article>
        </div>
    </main>
